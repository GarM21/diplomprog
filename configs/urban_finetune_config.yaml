dataset:
  root: dataset/urban_tree_india
  image_size: 512
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  features: 64

training:
  device: auto
  seed: 42
  epochs: 20
  batch_size: 2
  learning_rate: 0.00002
  num_workers: 0
  threshold: 0.5
  pretrained_weights: weights/loveda_best_unet.pth

paths:
  best_model: weights/best_unet.pth
  last_model: weights/last_unet.pth
